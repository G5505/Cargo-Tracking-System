<!DOCTYPE html>
<html>
<head>
    <title>CargoFlow Admin</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="navbar">
    <div class="logo">CargoFlow</div>
    <div class="nav-links">
        <a href="/">Tracking Page</a>
        <a href="/logout">Logout</a>
    </div>
</div>

<div class="admin-page">

    <div class="admin-header">
        <h1>Admin Panel</h1>
        <p>Add new shipments or update shipment status.</p>
    </div>

    <div class="admin-card">

        <div class="dashboard-cards">

            <div class="dash-card">
                <span>Total Shipments</span>
                <strong id="totalShipments">0</strong>
            </div>

            <div class="dash-card">
                <span>Delivered</span>
                <strong id="deliveredShipments">0</strong>
            </div>

            <div class="dash-card">
                <span>In Transit</span>
                <strong id="inTransitShipments">0</strong>
            </div>

            <div class="dash-card">
                <span>Pending</span>
                <strong id="pendingShipments">0</strong>
            </div>
        </div>

        <h2 class="form-title">Add / Renew Shipment</h2>

        <input type="text" id="trackingId" placeholder="Tracking ID">
        <input type="text" id="sender" placeholder="Sender">
        <input type="text" id="receiver" placeholder="Receiver">

        <select id="status">
            <option>Order Created</option>
            <option>Picked Up</option>
            <option>In Transit</option>
            <option>Out for Delivery</option>
            <option>Delivered</option>
        </select>

        <input type="text" id="location" placeholder="Current Location">

        <button onclick="addShipment()">Save Shipment</button>

        <hr>

        <h2 class="form-title">Update Shipment Status</h2>

        <input type="text" id="updateTrackingId" placeholder="Tracking ID">

        <select id="updateStatus">
            <option>Order Created</option>
            <option>Picked Up</option>
            <option>In Transit</option>
            <option>Out for Delivery</option>
            <option>Delivered</option>
        </select>

        <input type="text" id="updateLocation" placeholder="New Location">

        <button onclick="updateShipment()">Update Shipment</button>

        <button onclick="deleteShipment()" class="delete-btn">
            Delete Shipment
        </button>

        <div id="message" class="result"></div>

    </div>

</div>


<script>
    
    function loadDashboard() {
    fetch("/api/dashboard")
    .then(response => response.json())
    .then(data => {
        document.getElementById("totalShipments").innerText = data.total;
        document.getElementById("deliveredShipments").innerText = data.delivered;
        document.getElementById("inTransitShipments").innerText = data.in_transit;
        document.getElementById("pendingShipments").innerText = data.pending;
    });
}

loadDashboard();


    function deleteShipment() {

    const trackingId =
        document.getElementById("updateTrackingId").value;

    if (!trackingId) {
        document.getElementById("message").innerHTML =
            `<p class="error">Enter Tracking ID First</p>`;
        return;
    }

    const confirmDelete =
        confirm("Are you sure you want to delete this shipment?");

    if (!confirmDelete) {
        return;
    }

    fetch(`/api/delete/${trackingId}`, {
        method: "DELETE"
    })
    .then(response => response.json())
    .then(data => {

        const message =
            document.getElementById("message");

        if (data.error) {
            message.innerHTML =
                `<p class="error">${data.error}</p>`;
        } else {
            message.innerHTML =
                `<p class="success">${data.message}</p>`;
        }
    });
}
function addShipment() {
    const data = {
        tracking_id: document.getElementById("trackingId").value,
        sender: document.getElementById("sender").value,
        receiver: document.getElementById("receiver").value,
        status: document.getElementById("status").value,
        location: document.getElementById("location").value
    };

    if (!data.tracking_id || !data.sender || !data.receiver || !data.location) {
        document.getElementById("message").innerHTML =
            `<p class="error">Please fill all shipment fields.</p>`;
        return;
    }

    fetch("/api/add", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(data)
    })
    .then(response => response.json())
    .then(data => {
        document.getElementById("message").innerHTML =
            `<p class="success">${data.message}</p>`;
    });
}

function updateShipment() {
    const data = {
        tracking_id: document.getElementById("updateTrackingId").value,
        status: document.getElementById("updateStatus").value,
        location: document.getElementById("updateLocation").value
    };

    if (!data.tracking_id || !data.location) {
        document.getElementById("message").innerHTML =
            `<p class="error">Please enter tracking ID and new location.</p>`;
        return;
    }

    fetch("/api/update", {
        method: "PUT",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(data)
    })
    .then(response => response.json())
    .then(data => {
        const message = document.getElementById("message");

        if (data.error) {
            message.innerHTML = `<p class="error">${data.error}</p>`;
        } else {
            message.innerHTML = `<p class="success">${data.message}</p>`;
        }
    });
}
</script>

</body>
</html>
